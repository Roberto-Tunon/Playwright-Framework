name: Daily Regression Tests

# Trigger: Runs daily at 9:00 UTC
on:
  schedule:
    # Cron format: minute hour day month day-of-week
    # 0 7 * * * = Every day at 7:00 UTC = 9:00 Madrid (CEST/CET)
    - cron: '0 7 * * *'
  
  # Allow manual trigger from the UI with suite selection
  workflow_dispatch:
    inputs:
      suite:
        description: 'Choose test suite to run'
        required: true
        default: 'default'
        type: choice
        options:
          - Default
          - Regression
          - Smoke
          - Sanity
          - CreditCard
          - PayPal
          - Klarna
          - Billie
          - Austria
          - Germany

jobs:
  # ═════════════════════════════════════════════════════════════
  # 1️⃣ LOGIN - Restore SSO Session from GitHub Secret
  # ═════════════════════════════════════════════════════════════
  Login:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Checkout repository
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      # Restore SSO authentication session from secret
      - name: 🔐 Restore SSO Session
        run: |
          if [[ -z "${{ secrets.AUTH_JSON }}" ]]; then
            echo ""
            echo "╔═══════════════════════════════════════════════════════╗"
            echo "║  ❌ ERROR: AUTH_JSON secret not configured             ║"
            echo "╚═══════════════════════════════════════════════════════╝"
            echo ""
            echo "📌 To fix this, follow these steps:"
            echo ""
            echo "   1️⃣  Generate auth.json locally:"
            echo "       npm run login"
            echo ""
            echo "   2️⃣  Encode to base64:"
            echo "       npm run prepare-secret"
            echo ""
            echo "   3️⃣  Add as GitHub Secret:"
            echo "       - Go to: repo Settings → Secrets and variables → Actions"
            echo "       - Click: 'New repository secret'"
            echo "       - Name: AUTH_JSON"
            echo "       - Value: [paste the base64 string from step 2]"
            echo "       - Click: 'Add secret'"
            echo ""
            echo "   📖 For detailed instructions, see: SSO-GITHUB-ACTIONS.md"
            echo ""
            exit 1
          fi
          
          echo "📝 Decoding AUTH_JSON from base64..."
          echo "${{ secrets.AUTH_JSON }}" | base64 -d > auth.json
          
          if [ ! -f auth.json ]; then
            echo "❌ Failed to create auth.json"
            exit 1
          fi
          
          echo "✅ SSO session successfully restored from secret"
          echo "$(wc -c < auth.json) bytes of authentication data loaded"
      
      # Verify auth.json is valid JSON
      - name: ✅ Verify authentication file
        run: |
          if jq empty auth.json 2>/dev/null; then
            echo "✅ auth.json is valid JSON"
          else
            echo "❌ auth.json is corrupted or invalid base64"
            exit 1
          fi
      
      # Summary
      - name: 📋 Login Complete
        run: |
          echo ""
          echo "════════════════════════════════════════════════════════"
          echo "✅ LOGIN JOB COMPLETED SUCCESSFULLY"
          echo "════════════════════════════════════════════════════════"
          echo "🔐 Step 1: Checkout ✓"
          echo "🔐 Step 2: Decoded AUTH_JSON secret ✓"
          echo "🔐 Step 3: Verified authentication file ✓"
          echo "════════════════════════════════════════════════════════"
          echo ""

  # ═════════════════════════════════════════════════════════════
  # 2️⃣ SETUP - Install Dependencies & Browsers
  # ═════════════════════════════════════════════════════════════
  Setup:
    runs-on: ubuntu-latest
    needs: Login
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    timeout-minutes: 30
    
    steps:
      # Step 1: Clone the repository
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      # Step 2: Setup Node.js
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      # Verify Node.js installation
      - name: ✓ Verify Node.js installation
        run: |
          echo "=========================================="
          echo "STEP 1: Checkout completed ✓"
          echo "STEP 2: Node.js configured ✓"
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "=========================================="
          echo ""
      
      # Create .npmrc with Nexus credentials
      - name: 🔐 Configure npm registry credentials
        run: |
          cat > ~/.npmrc << EOF
          registry=http://registry.npmjs.org/
          //nexus.xxxlgroup.com/repository/npm-ecom/:_authToken=${{ secrets.NPM_NEXUS_TOKEN }}
          strict-ssl=false
          EOF
          echo "✅ NPM registry credentials configured"
          echo ""
      
      # Step 3: Install dependencies
      - name: 📦 Install dependencies
        run: |
          echo "=========================================="
          echo "STEP 3: Installing npm dependencies..."
          echo "=========================================="
          npm ci
          echo "✅ Dependencies installed successfully"
          echo ""
      
      # Step 4: Install Playwright browsers
      - name: 🌐 Install Playwright browsers
        run: |
          echo "=========================================="
          echo "STEP 4: Installing Playwright browsers..."
          echo "=========================================="
          npx playwright install --with-deps
          echo "✅ Browsers installed successfully"
          echo ""
      
      # Setup complete summary
      - name: ✅ Setup Complete
        run: |
          echo ""
          echo "=========================================="
          echo "✅ SETUP JOB COMPLETED SUCCESSFULLY"
          echo "=========================================="
          echo "📦 Step 1: Checkout ✓"
          echo "🔧 Step 2: Node.js setup ✓"
          echo "📦 Step 3: Dependencies ✓"
          echo "🌐 Step 4: Playwright browsers ✓"
          echo "=========================================="
          echo "Ready to run tests!"
          echo "=========================================="

  # ═════════════════════════════════════════════════════════════
  # 3️⃣ TESTS - Run Regression Tests
  # ═════════════════════════════════════════════════════════════
  Tests:
    runs-on: ubuntu-latest
    needs: Setup
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    timeout-minutes: 60
    
    steps:
      # Step 1: Clone the repository
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      # Step 2: Setup Node.js
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      # Configure npm registry credentials
      - name: 🔐 Configure npm registry credentials
        run: |
          cat > ~/.npmrc << EOF
          registry=http://registry.npmjs.org/
          //nexus.xxxlgroup.com/repository/npm-ecom/:_authToken=${{ secrets.NPM_NEXUS_TOKEN }}
          strict-ssl=false
          EOF
      
      # Reinstall dependencies (fast due to cache)
      - name: 📦 Install dependencies
        run: npm ci
      
      # Install Playwright browsers
      - name: 🌐 Install Playwright browsers
        run: npx playwright install --with-deps
      
      # Restore auth.json from secret (same as Login job)
      - name: 🔐 Load SSO Session
        run: |
          echo "${{ secrets.AUTH_JSON }}" | base64 -d > auth.json
          echo "✅ Authentication session loaded"
      
      # Step 3: Run the regression tests
      - name: 🚀 Run regression tests
        run: |
          echo "=========================================="
          echo "STARTING TEST EXECUTION ⏱️"
          echo "=========================================="
          
          SUITE="${{ github.event.inputs.suite }}"
          if [ "$SUITE" = "default" ] || [ -z "$SUITE" ]; then
            echo "📋 Mode: Default batch (8 permanent + 4 random)"
            node runner.js
          else
            echo "📋 Mode: Suite execution"
            echo "🎯 Suite: $SUITE"
            node runner.js --suite=$SUITE
          fi
          
          echo ""
          echo "✅ Tests completed"
      
      # Step 4: Upload Allure results
      - name: 📈 Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30
      
      # Step 5: Upload HTML report
      - name: 📊 Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
      
      # Step 6: Publish to GitHub Pages
      - name: 🌐 Publish report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
      
      # Step 7: Failure notification
      - name: 💬 Notify on failure
        if: failure()
        run: |
          echo ""
          echo "╔═══════════════════════════════════════════════════════╗"
          echo "║  ❌ REGRESSION TESTS FAILED                           ║"
          echo "╚═══════════════════════════════════════════════════════╝"
          echo ""
          echo "⏰ Execution time: $(date)"
          echo "📍 Repository: ${{ github.repository }}"
          echo "🔗 View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
      
      # Step 8: Success summary
      - name: ✅ Tests Job Complete
        if: success()
        run: |
          echo ""
          echo "════════════════════════════════════════════════════════"
          echo "✅ TESTS JOB COMPLETED SUCCESSFULLY"
          echo "════════════════════════════════════════════════════════"
          echo "🚀 Step 1: Tests executed ✓"
          echo "📊 Step 2: Allure results uploaded ✓"
          echo "📈 Step 3: Allure report uploaded ✓"
          echo "🌐 Step 4: Published to GitHub Pages ✓"
          echo "════════════════════════════════════════════════════════"
          echo "⏱️  Completed at: $(date)"
          echo "🎉 All tests passed!"
          echo "════════════════════════════════════════════════════════"
          echo ""

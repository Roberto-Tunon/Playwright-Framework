name: Daily Regression Tests

# Trigger: Runs daily at 9:00 UTC
on:
  schedule:
    # Cron format: minute hour day month day-of-week
    # 0 9 * * * = Every day at 9:00 UTC
    - cron: '0 9 * * *'
  
  # Allow manual trigger from the UI
  workflow_dispatch:

jobs:
  Setup:
    runs-on: ubuntu-latest
    
    # Force Node.js 24 for GitHub Actions
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    timeout-minutes: 30
    
    steps:
      # Step 1: Clone the repository
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      # Step 2: Setup Node.js
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      # Verify Node.js installation
      - name: ✓ Verify Node.js installation
        run: |
          echo "=========================================="
          echo "STEP 1: Checkout completed ✓"
          echo "STEP 2: Node.js configured ✓"
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "=========================================="
          echo ""
      
      # Create .npmrc with Nexus credentials
      - name: 🔐 Configure npm registry credentials
        run: |
          cat > ~/.npmrc << EOF
          registry=http://registry.npmjs.org/
          //nexus.xxxlgroup.com/repository/npm-ecom/:_authToken=${{ secrets.NPM_NEXUS_TOKEN }}
          strict-ssl=false
          EOF
          echo "✅ NPM registry credentials configured"
          echo ""
      
      # Step 3: Install dependencies
      - name: 📦 Install dependencies
        run: |
          echo "=========================================="
          echo "STEP 3: Installing npm dependencies..."
          echo "=========================================="
          npm ci
          echo "✅ Dependencies installed successfully"
          echo ""
      
      # Step 4: Install Playwright browsers
      - name: 🌐 Install Playwright browsers
        run: |
          echo "=========================================="
          echo "STEP 4: Installing Playwright browsers..."
          echo "=========================================="
          npx playwright install --with-deps
          echo "✅ Browsers installed successfully"
          echo ""
      
      # Setup complete summary
      - name: ✅ Setup Complete
        run: |
          echo ""
          echo "=========================================="
          echo "✅ SETUP JOB COMPLETED SUCCESSFULLY"
          echo "=========================================="
          echo "📦 Step 1: Checkout ✓"
          echo "🔧 Step 2: Node.js setup ✓"
          echo "📦 Step 3: Dependencies ✓"
          echo "🌐 Step 4: Playwright browsers ✓"
          echo "=========================================="
          echo "Ready to run tests!"
          echo "=========================================="

  Tests:
    runs-on: ubuntu-latest
    needs: Setup    
    # Force Node.js 24 for GitHub Actions
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        timeout-minutes: 60
    
    steps:
      # Step 5: Clone the repository again (needed for new job)
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      # Step 6: Setup Node.js again (needed for new job)
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      # Recreate .npmrc credentials
      - name: 🔐 Configure npm registry credentials
        run: |
          cat > ~/.npmrc << EOF
          registry=http://registry.npmjs.org/
          //nexus.xxxlgroup.com/repository/npm-ecom/:_authToken=${{ secrets.NPM_NEXUS_TOKEN }}
          strict-ssl=false
          EOF
      
      # Reinstall dependencies (fast due to cache)
      - name: 📦 Install dependencies
        run: npm ci
      
      # Step 7: Run the regression tests
      - name: 🚀 Run regression tests
        run: |
          echo "=========================================="
          echo "STEP 5: STARTING REGRESSION TESTS ⏱️"
          echo "=========================================="
          node runner.js
          echo ""
          echo "✅ Tests completed"
      
      # Step 8: Upload Allure results
      - name: 📊 Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30
      
      # Step 9: Upload HTML report
      - name: 📈 Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
      
      # Step 10: Failure notification
      - name: 💬 Notify on failure
        if: failure()
        run: |
          echo "❌ Regression tests failed"
          echo "⏰ Execution time: $(date)"
          echo "📍 Repository: ${{ github.repository }}"
          echo "🔗 View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      
      # Step 11: Success summary
      - name: ✅ Tests Job Complete
        if: success()
        run: |
          echo ""
          echo "=========================================="
          echo "✅ TESTS JOB COMPLETED SUCCESSFULLY"
          echo "=========================================="
          echo "🚀 Step 5: Tests executed ✓"
          echo "📊 Step 6: Allure results uploaded ✓"
          echo "📈 Step 7: Allure report uploaded ✓"
          echo "=========================================="
          echo "⏱️  Completed at: $(date)"
          echo "🎉 All tests passed!"
          echo "=========================================="
# Forcing GitHub refresh

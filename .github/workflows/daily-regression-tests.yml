name: Daily Regression Tests

# Trigger: Runs daily at 9:00 UTC
on:
  schedule:
    # Cron format: minute hour day month day-of-week
    # 0 9 * * * = Every day at 9:00 UTC
    - cron: '0 9 * * *'
  
  # Allow manual trigger from the UI
  workflow_dispatch:

jobs:
  regression-tests:
    runs-on: ubuntu-latest
    
    # Timeout to prevent hanging
    timeout-minutes: 60
    
    steps:
      # Step 1: Clone the repository
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      # Step 2: Setup Node.js
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'  # Cache node_modules for faster installation
      
      # Verify Node.js installation
      - name: ✓ Verify Node.js installation
        run: |
          echo "=========================================="
          echo "STEP 2: Node.js configured ✓"
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "=========================================="
          echo ""
      
      # Step 3: Install dependencies
      - name: 📦 Install dependencies
        run: |
          echo "=========================================="
          echo "STEP 3: Installing npm dependencies..."
          echo "=========================================="
          npm ci
          echo "✅ Dependencies installed successfully"
          echo ""
      
      # Step 4: Install Playwright browsers
      - name: 🌐 Install Playwright browsers
        run: |
          echo "=========================================="
          echo "STEP 4: Installing Playwright browsers..."
          echo "=========================================="
          npx playwright install --with-deps
          echo "✅ Browsers installed successfully"
          echo ""
      
      # Step 5: Run the regression tests
      - name: 🚀 Run regression tests
        run: |
          echo "=========================================="
          echo "STEP 5: STARTING REGRESSION TESTS ⏱️"
          echo "=========================================="
          node runner.js
          echo ""
          echo "✅ Tests completed"
      
      # Step 6: Upload Allure results (if they exist)
      - name: 📊 Upload Allure results
        if: always()  # Runs even if the previous step fails
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30  # Keep results for 30 days
      
      # Step 7: Upload HTML report (dashboard)
      - name: 📈 Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
      
      # Step 8: Failure notification (optional)
      - name: 💬 Notify on failure
        if: failure()
        run: |
          echo "❌ Regression tests failed"
          echo "⏰ Execution time: $(date)"
          echo "📍 Repository: ${{ github.repository }}"
          echo "🔗 View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      
      # Step 9: Success summary
      - name: ✅ Success Summary
        if: success()
        run: |
          echo ""
          echo "=========================================="
          echo "✅ WORKFLOW COMPLETED SUCCESSFULLY"
          echo "=========================================="
          echo "📦 Step 1: Checkout ✓"
          echo "🔧 Step 2: Node.js setup ✓"
          echo "📦 Step 3: Dependencies ✓"
          echo "🌐 Step 4: Playwright browsers ✓"
          echo "🚀 Step 5: Tests executed ✓"
          echo "📊 Step 6: Allure results uploaded ✓"
          echo "📈 Step 7: Allure report uploaded ✓"
          echo "=========================================="
          echo "⏱️  Total time: $(date)"
          echo "🎉 All steps completed successfully"
          echo "=========================================="

name: Playwright Tests
on:
  workflow_dispatch:
    inputs:
      rail:
        description: 'Marca (RAIL)'
        required: true
        default: 'xxxlutz'
        type: choice
        options:
          - xxxlutz
          - moemax
          - moebelix
      country:
        description: 'País (COUNTRY)'
        required: true
        default: 'AT'
        type: choice
        options:
          - AT
          - DE
          - SE

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.41.0-jammy # Usamos Docker

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        # Creamos un archivo temporal para ignorar el Nexus privado
        echo "@playwright:registry=https://registry.npmjs.org/" > .npmrc
        echo "registry=https://registry.npmjs.org/" >> .npmrc
        npm install

    - name: Run Playwright tests
      run: npx playwright test tests/E2E-Lutz-Credit.spec.js --project chromium
      env:
        # Aquí pasamos tus variables de ejecución
        RAIL: ${{ github.event.inputs.rail }}
        COUNTRY: ${{ github.event.inputs.country }}
        MODE: "1P"

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
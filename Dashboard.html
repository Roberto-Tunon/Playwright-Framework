<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA Market Monitor | Roberto Tuñón</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .market-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .market-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .dot-pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">

    <nav class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200">
                <i data-lucide="shield-check" class="text-white w-7 h-7"></i>
            </div>
            <div>
                <h1 class="text-xl font-black tracking-tight leading-none text-slate-800 uppercase">Market <span class="text-blue-600">Monitor</span></h1>
                <p class="text-[11px] text-slate-400 font-bold uppercase tracking-wider mt-1 italic">Author: <span class="text-slate-600 font-black">Roberto Tuñón</span></p>
            </div>
        </div>
        <div class="flex items-center gap-8">
            <div class="hidden md:flex flex-col items-end">
                <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest leading-none mb-1">Global Status</span>
                <div id="global-status-container"></div>
            </div>
            <div class="text-right border-l border-slate-200 pl-8">
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">Last Sync</p>
                <p id="last-update" class="text-sm font-mono font-bold text-slate-700">--:--:--</p>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-8 flex-grow w-full">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm flex items-center gap-6">
                <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600">
                    <i data-lucide="globe-2" class="w-7 h-7"></i>
                </div>
                <div>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Active Markets</p>
                    <p class="text-3xl font-black text-slate-800" id="stat-markets">0</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm flex items-center gap-6 border-l-4 border-l-green-500">
                <div class="w-14 h-14 bg-green-50 rounded-2xl flex items-center justify-center text-green-600">
                    <i data-lucide="trending-up" class="w-7 h-7"></i>
                </div>
                <div>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Global Health</p>
                    <p class="text-3xl font-black text-green-600" id="stat-health">--%</p>
                </div>
            </div>
            <div class="bg-slate-900 p-6 rounded-3xl shadow-2xl flex items-center gap-6 text-white overflow-hidden relative">
                <div class="w-14 h-14 bg-slate-800 rounded-2xl flex items-center justify-center text-blue-400">
                    <i data-lucide="calendar-clock" class="w-7 h-7"></i>
                </div>
                <div class="z-10">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest text-slate-400">Next Scheduled Run</p>
                    <p class="text-2xl font-black leading-none mt-1">02:00 <span class="text-sm font-medium text-slate-400 italic">AM</span></p>
                    <p id="next-run-date" class="text-[10px] font-bold text-blue-400 mt-2 uppercase tracking-tight"></p>
                </div>
                <i data-lucide="zap" class="absolute -right-4 -bottom-4 w-24 h-24 text-slate-800 opacity-50"></i>
            </div>
        </div>

        <h2 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-8 flex items-center gap-2">
            <i data-lucide="activity" class="w-4 h-4 text-blue-500"></i> Market Health Status
        </h2>
        <div id="market-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </main>

    <footer class="mt-auto py-10 border-t border-slate-200 bg-white">
        <div class="max-w-7xl mx-auto px-8 flex flex-col items-center justify-center gap-2">
            <div class="flex items-center gap-2 text-slate-400">
                <i data-lucide="code-2" class="w-4 h-4 text-blue-500"></i>
                <p class="text-xs font-bold uppercase tracking-[0.2em]">Developed & Maintained by</p>
            </div>
            <p class="text-sm font-black text-slate-800 tracking-tight uppercase">Roberto Tuñón</p>
            <p class="text-[10px] text-slate-300 font-bold uppercase tracking-widest mt-2">© 2026 QA Automation Infrastructure</p>
        </div>
    </footer>

    <script>
        const marketData = [
            {
                id: "AT", country: "Austria", flag: "🇦🇹", rail: "XXXLutz", status: "Operational", lastRun: "Today, 14:30",
                payments: [
                    { name: "Credit Card", status: "passed", time: "42s", icon: "credit-card" },
                    { name: "PayPal", status: "passed", time: "35s", icon: "wallet" },
                    { name: "Klarna Pay Later", status: "passed", time: "52s", icon: "zap" },
                    { name: "Bank Transfer", status: "passed", time: "31s", icon: "landmark" }
                ]
            },
            {
                id: "HU", country: "Hungary", flag: "🇭🇺", rail: "Moemax", status: "Incident", lastRun: "Today, 14:45",
                payments: [
                    { name: "Credit Card", status: "passed", time: "48s", icon: "credit-card" },
                    { name: "PayPal", status: "failed", time: "12s", icon: "wallet" },
                    { name: "Klarna", status: "idle", time: "-", icon: "zap" },
                    { name: "Apple Pay", status: "passed", time: "25s", icon: "smartphone" }
                ]
            },
            {
                id: "SK", country: "Slovakia", flag: "🇸🇰", rail: "Moemax", status: "Operational", lastRun: "Today, 15:00",
                payments: [
                    { name: "Credit Card", status: "passed", time: "41s", icon: "credit-card" },
                    { name: "Bank Transfer", status: "passed", time: "30s", icon: "landmark" },
                    { name: "PayPal", status: "passed", time: "39s", icon: "wallet" }
                ]
            },
            {
                id: "DE", country: "Germany", flag: "🇩🇪", rail: "XXXLutz", status: "Idle", lastRun: "Yesterday",
                payments: [
                    { name: "Credit Card", status: "idle", time: "-", icon: "credit-card" },
                    { name: "PayPal", status: "idle", time: "-", icon: "wallet" },
                    { name: "Klarna", status: "idle", time: "-", icon: "zap" }
                ]
            }
        ];

        function renderDashboard() {
            const grid = document.getElementById('market-grid');
            grid.innerHTML = '';

            const hasIncidents = marketData.some(m => m.status === 'Incident');
            const statusContainer = document.getElementById('global-status-container');
            
            if (hasIncidents) {
                statusContainer.innerHTML = `
                    <span class="flex items-center gap-2 text-xs font-black text-red-600 bg-red-50 px-3 py-1 rounded-lg border border-red-100 shadow-sm">
                        <span class="w-2.5 h-2.5 bg-red-500 rounded-full dot-pulse"></span> ATTENTION REQUIRED
                    </span>`;
            } else {
                statusContainer.innerHTML = `
                    <span class="flex items-center gap-2 text-xs font-black text-green-600 bg-green-50 px-3 py-1 rounded-lg border border-green-100 shadow-sm">
                        <span class="w-2.5 h-2.5 bg-green-500 rounded-full"></span> SYSTEM OPERATIONAL
                    </span>`;
            }

            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            const dateOptions = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            // CAMBIO AQUÍ: Formato en inglés (en-GB)
            document.getElementById('next-run-date').innerText = tomorrow.toLocaleDateString('en-GB', dateOptions);

            document.getElementById('stat-markets').innerText = marketData.length;
            const allPayments = marketData.flatMap(m => m.payments);
            const passedTests = allPayments.filter(p => p.status === 'passed').length;
            const totalRan = allPayments.filter(p => p.status !== 'idle').length;
            document.getElementById('stat-health').innerText = (totalRan > 0 ? Math.round((passedTests / totalRan) * 100) : 0) + "%";

            marketData.forEach(market => {
                const isIncident = market.status === 'Incident';
                const statusColor = isIncident ? 'red' : market.status === 'Operational' ? 'green' : 'slate';
                
                const paymentRows = market.payments.map(p => {
                    const dotClass = p.status === 'passed' ? 'bg-green-500 shadow-green-100' : 
                                    p.status === 'failed' ? 'bg-red-500 dot-pulse shadow-red-100' : 'bg-slate-200';
                    const textClass = p.status === 'failed' ? 'text-red-600 font-bold italic' : 
                                     p.status === 'idle' ? 'text-slate-300' : 'text-slate-600 font-medium';
                    
                    return `
                        <div class="flex items-center justify-between py-2 border-b border-slate-50 last:border-0">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center shadow-sm">
                                    <i data-lucide="${p.icon}" class="w-4 h-4 ${p.status === 'failed' ? 'text-red-500' : 'text-slate-400'}"></i>
                                </div>
                                <span class="text-[12px] ${textClass}">${p.name}</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="text-[10px] font-mono ${p.status === 'idle' ? 'text-slate-200' : 'text-slate-400'}">${p.time}</span>
                                <div class="w-2.5 h-2.5 rounded-full ${dotClass}"></div>
                            </div>
                        </div>
                    `;
                }).join('');

                grid.innerHTML += `
                    <div class="market-card bg-white rounded-[2.5rem] border border-slate-200 p-7 shadow-sm flex flex-col">
                        <div class="flex justify-between items-start mb-6">
                            <div class="flex items-center gap-4">
                                <div class="text-4xl filter drop-shadow-sm">${market.flag}</div>
                                <div>
                                    <h3 class="font-extrabold text-slate-800 text-lg leading-tight tracking-tight">${market.country}</h3>
                                    <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mt-0.5">${market.rail}</p>
                                </div>
                            </div>
                            <span class="text-[9px] font-black px-2.5 py-1.5 rounded-xl bg-${statusColor}-50 text-${statusColor}-600 uppercase border border-${statusColor}-100">
                                ${market.status}
                            </span>
                        </div>
                        <div class="flex-grow space-y-0.5 mb-6 px-1">${paymentRows}</div>
                        <button onclick="window.open('./allure-report/index.html')" 
                                class="group w-full bg-slate-900 hover:bg-blue-600 text-white py-4 rounded-2xl text-[11px] font-bold transition-all flex items-center justify-center gap-3 shadow-lg shadow-slate-100">
                            <i data-lucide="bar-chart-3" class="w-4 h-4"></i>
                            OPEN ALLURE REPORT
                            <i data-lucide="arrow-right" class="w-4 h-4 transition-transform group-hover:translate-x-1"></i>
                        </button>
                        <div class="mt-5 flex items-center justify-center gap-2 text-slate-300">
                             <i data-lucide="history" class="w-3 h-3 text-slate-200"></i>
                             <span class="text-[9px] font-black uppercase tracking-widest">${market.lastRun}</span>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        document.getElementById('last-update').innerText = new Date().toLocaleTimeString();
        renderDashboard();
    </script>
</body>
</html>
